<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English জানালা</title>
    <!-- font awesome link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- font family link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- stylesheet link -->
    <link rel="stylesheet" href="./style.css" />

    <!-- daisy ui link and tailwind css link -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <!-- Header starts here  -->
    <header class="h-dvh">
      <nav class="bg-[#BADEFF26] border-b border-[#C6BDBD] fixed w-full z-10">
        <div class="w-12/13 mx-auto flex items-center justify-between py-5">
          <div class="flex items-center gap-1 cursor-pointer">
            <p class="poppins-semibold">English</p>
            <img
              src="./assets/logo.png"
              alt="logo"
              width="40px"
              height="40px"
            />
            <p class="hind-siliguri-regular">জানালা</p>
          </div>
          <div class="flex gap-4">
            <button class="btn btn-outline btn-primary">
              <i class="fa-solid fa-circle-question"></i>FAQ
            </button>
            <button class="btn btn-outline btn-primary">
              <i class="fa-solid fa-book-open"></i>Learn
            </button>
            <button class="btn btn-outline btn-primary">
              <i class="fa-solid fa-arrow-right-from-bracket"></i>Logout
            </button>
          </div>
        </div>
      </nav>
      <section class="flex items-center justify-between w-12/13 mx-auto h-full pt-20">
        <!-- left side login form and right side text content -->
   
          <div class="hero-content flex-col flex-1">
            <div class="text-left">
              <h1 class="poppins-bold text-5xl">
                <span class="text-[#00BCFF]">English</span> is Easy!!
              </h1>
              <p class="py-6 hind-siliguri-medium text-2xl">
                আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন
                অথবা আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে
                নিয়ে যাবে অন্য একটি Level এ
              </p>
            </div>
            <div class="flex flex-start w-full">
              <fieldset
                class="fieldset flex flex-col gap-5 justify-start items-start"
              >
                <input
                  type="name"
                  class="input"
                  placeholder="Enter Your Name"
                />

                <input type="password" class="input" placeholder="........" />

                <button class="btn btn-primary hover:bg-white hover:text-black">Login</button>
              </fieldset>
            </div>
          </div>


        <!-- right side text content -->
        <div class="flex items-center justify-end flex-1">
            <img src="./assets/hero-student.png" alt="">
        </div>
      </section>
    </header>
  </body>
</html>
